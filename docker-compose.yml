services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - ENABLE_AI=${ENABLE_AI:-true}
      - AI_API_BASE_URL=${AI_API_BASE_URL:-https://api.sbbbbbbbbb.xyz/v1}
      - AI_API_KEY=${AI_API_KEY:-sk-oGCxua7Ne7B9smHOnYAhujtLIWIVxbn4fs64VtxccoQxAEHw}
      - AI_MODEL=${AI_MODEL:-gpt-5.4}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "23333:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx-docker.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
